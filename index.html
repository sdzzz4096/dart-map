// --- 2. 料金計算ロジック ---
function calculatePrice(shop, daytime, time) {
  // 朝割ボタンが押された場合、朝割設定のない店舗は「昼」として処理するためのフォールバック
  let targetDaytime = daytime;
  if (daytime === 'weekday_morning' && !shop.pricing.weekday_morning) {
    targetDaytime = 'weekday_day';
  } else if (daytime === 'weekend_morning' && !shop.pricing.weekend_morning) {
    targetDaytime = 'weekend_day';
  }

  // --- コイン制 ---
  if (shop.type === "coin") {
    let total = 0; let breakdown = "";
    if (time === '30m') { total = 300; breakdown = "100円×3ゲーム目安"; }
    else if (time === '1h') { total = 600; breakdown = "100円×6ゲーム目安"; }
    else if (time === '3h') { total = 1800; breakdown = "100円×18ゲーム目安"; }
    else if (time === 'free') { return { total: 999999, text: "-", breakdown: "設定なし" }; }
    return { total: total, text: `¥${total.toLocaleString()}`, breakdown: breakdown };
  }

  // ★ ラウンドワンの賢い朝割ロジック（修正版）
  if (shop.type === 'round1') {
    // 基準となる昼料金を取得（週末か平日か）
    let normalDaytime = targetDaytime.includes('weekend') ? 'weekend_day' : 'weekday_day';
    let normalP = shop.pricing[normalDaytime];
    
    // 朝割のデータがあれば取得
    let morningP = targetDaytime.includes('morning') ? shop.pricing[targetDaytime] : null;
    let isMorning = !!morningP;
    
    let fixedCost = shop.drink || 350; // 通常のワンオーダー目安
    let rate1h = normalP.rate1h || (normalP.rate30m * 2);
    
    let total = 0; let breakdown = "";

    // まず通常の時間料金として計算
    if (time === '30m') { 
      total = fixedCost + normalP.rate30m; 
      breakdown = `1D目安 ¥${fixedCost} + 30分 ¥${normalP.rate30m}`; 
    }
    else if (time === '1h') { 
      total = fixedCost + rate1h; 
      breakdown = `1D目安 ¥${fixedCost} + 1h ¥${rate1h}`; 
    }
    else if (time === '3h') {
      if (normalP.pack3h) { 
        total = fixedCost + normalP.pack3h; 
        breakdown = `1D目安 ¥${fixedCost} + 3h目安 ¥${normalP.pack3h}`; 
      } else { 
        total = fixedCost + (rate1h * 3); 
        breakdown = `1D目安 ¥${fixedCost} + 通常(1h×3) ¥${rate1h * 3}`; 
      }
    }
    else if (time === 'free') {
      if (normalP.free) { 
        total = fixedCost + normalP.free; 
        breakdown = `1D目安 ¥${fixedCost} + フリー ¥${normalP.free}`; 
      } else { 
        total = 999999; breakdown = "設定なし"; 
      }
    }

    // 朝割（ドリンクバー込みフリータイム）の方が安ければ上書きする処理
    if (isMorning && morningP && morningP.free) {
      if (time === 'free' || morningP.free < total) {
        total = morningP.free;
        let suffix = time === 'free' ? "" : " (※通常より朝割が安いため適用)";
        breakdown = `朝割Dバー込フリー ¥${morningP.free}${suffix}`;
      }
    }

    if (total === 999999) return { total: 999999, text: "-", breakdown: breakdown };
    return { total: total, text: `¥${total.toLocaleString()}`, breakdown: breakdown };
  }

  // --- カラオケ館 秋葉原（学生） ---
  if (shop.type === 'karaoke_student_akiba') {
    let total = 0; let breakdown = ""; const p = shop.pricing[targetDaytime];
    let fixedCost = shop.drink || 420; 
    let fixedText = `1D代目安 ¥${fixedCost} + `;
    let rate1h = p.rate1h || (p.rate30m * 2);

    if (time === '30m') { total = fixedCost + p.rate30m; breakdown = fixedText + `30分 ¥${p.rate30m}`; }
    else if (time === '1h') { total = fixedCost + rate1h; breakdown = fixedText + `1h ¥${rate1h}`; }
    else if (time === '3h') {
      if (p.pack3h) { total = p.pack3h; breakdown = `Dバー込3hパック ¥${p.pack3h}`; }
      else { total = fixedCost + (rate1h * 3); breakdown = fixedText + `通常(1h×3) ¥${rate1h * 3}`; }
    }
    else if (time === 'free') {
      if (p.free) { total = p.free; breakdown = `ドリンクバー込 ¥${p.free}`; }
      else { return { total: 999999, text: "-", breakdown: "設定なし" }; }
    }
    return { total: total, text: `¥${total.toLocaleString()}`, breakdown: breakdown };
  }

  // --- カラオケ館 五反田（学生） ---
  if (shop.type === 'karaoke_student_gotanda') {
    let total = 0; let breakdown = ""; const p = shop.pricing[targetDaytime];
    let isNight = targetDaytime.includes('night');
    
    if (time === 'free') {
      if (p.free) { return { total: p.free, text: `¥${p.free.toLocaleString()}`, breakdown: `ドリンクバー込 ¥${p.free}` }; } 
      else return { total: 999999, text: "-", breakdown: "設定なし" };
    }
    
    let fixedCost = isNight ? 500 : 0; 
    let fixedText = fixedCost > 0 ? `1D代目安 ¥${fixedCost} + ` : `Dバー込 `;
    let rate1h = p.rate1h || (p.rate30m * 2);
    
    if (time === '30m') { total = fixedCost + p.rate30m; breakdown = fixedText + `30分 ¥${p.rate30m}`; }
    else if (time === '1h') { total = fixedCost + rate1h; breakdown = fixedText + `1h ¥${rate1h}`; }
    else if (time === '3h') {
       if (p.pack3h) { total = fixedCost + p.pack3h; breakdown = fixedText + `3hパック ¥${p.pack3h}`; }
       else { total = fixedCost + (rate1h * 3); breakdown = fixedText + `通常(1h×3) ¥${rate1h * 3}`; }
    }
    return { total: total, text: `¥${total.toLocaleString()}`, breakdown: breakdown };
  }

  // --- 通常店舗 ---
  let total = 0; let breakdown = ""; const p = shop.pricing[targetDaytime];
  let fixedCost = (shop.charge || 0) + (shop.drink || 0);
  let fixedText = fixedCost > 0 ? `D代等 ¥${fixedCost} + ` : "";
  let rate1h = p.rate1h || (p.rate30m * 2);

  if (time === '30m') { 
    total = fixedCost + p.rate30m;
    breakdown = fixedText + (p.rate30m === rate1h ? `最初の60分 ¥${p.rate30m}` : `30分 ¥${p.rate30m}`);
  } 
  else if (time === '1h') { total = fixedCost + rate1h; breakdown = fixedText + `1h ¥${rate1h}`; } 
  else if (time === '3h') {
    if (p.pack3h) { total = fixedCost + p.pack3h; breakdown = fixedText + `3hパック等 ¥${p.pack3h}`; } 
    else { total = fixedCost + (rate1h * 3); breakdown = fixedText + `通常(1h×3) ¥${rate1h * 3}`; }
  } 
  else if (time === 'free') {
    if (p.free) { total = fixedCost + p.free; breakdown = fixedText + `フリータイム ¥${p.free}`; } 
    else { return { total: 999999, text: "-", breakdown: "設定なし" }; }
  }
  return { total: total, text: `¥${total.toLocaleString()}`, breakdown: breakdown };
}

// --- 3. 地図の設定 ---
let map = L.map('map').setView([35.705, 139.730], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
let markerObjects = []; 

// --- 4. 画面更新処理 ---
function updateDisplay() {
  let targetShops = shops;
  if (currentArea !== 'all') {
    targetShops = shops.filter(shop => shop.area === currentArea);
  }

  const results = targetShops.map(shop => {
    const calc = calculatePrice(shop, currentDaytime, currentTime);
    return { ...shop, calculatedTotal: calc.total, priceText: calc.text, breakdown: calc.breakdown };
  }).sort((a, b) => a.calculatedTotal - b.calculatedTotal);

  const listDiv = document.getElementById('shop-list');
  listDiv.innerHTML = ""; 
  
  markerObjects.forEach(m => map.removeLayer(m)); 
  markerObjects = [];

  results.forEach((shop, index) => {
    const isCheapest = index === 0;
    const rank = (isCheapest && shop.calculatedTotal !== 999999) ? `<span class="rank-badge">最安</span>` : "";
    const isUnavailable = shop.calculatedTotal === 999999;
    const cardStyle = isUnavailable ? "opacity: 0.5;" : "";

    let machinesHtml = "";
    if (shop.machines && shop.machines.length > 0) {
      machinesHtml = `<div class="machine-list">`;
      shop.machines.forEach(m => {
        let countHtml = m.count ? `<span class="machine-count">${m.count}台</span>` : "";
        machinesHtml += `<span class="machine-badge ${m.type}">${m.name} ${countHtml}</span>`;
      });
      machinesHtml += `</div>`;
    }

    let specialNote = "";
    if (currentDaytime.includes('morning') && !shop.pricing[currentDaytime]) {
       specialNote += `<div class="note" style="color: #ff9900; font-weight: bold;">※朝割設定なしのため、通常昼料金等で計算しています。</div>`;
    }
    
    if (shop.name.includes("GiGO POKER 新宿")) {
      specialNote += `<div class="note" style="color: #0066ff;">※同一店舗内で料金体系が分かれているため、疑似的に2店舗として表示しています。</div>`;
    } else if (shop.id === 24) {
      specialNote += `<div class="note" style="color: #0066ff; font-weight: bold;">※ドリンクバー込み。1hは延長料金加算で計算。平日3hはパックよりフリータイムが安いためフリータイム額を適用。</div>`;
    } else if (shop.type === 'round1') {
      specialNote += `<div class="note" style="color: #0066ff; font-weight: bold;">※朝割(ドリンクバー込)は11時まで受付限定。それ以外はワンオーダー制(350円目安)で計算。</div>`;
    } else if (shop.type === 'karaoke_student_gotanda') {
      specialNote += `<div class="note" style="color: #ff3b30; font-weight: bold;">※学生専用料金（昼と夜フリータイムはドリンクバー込）。<br>★夜の30分/1hは学生枠が無いため会員料金＋1Dで計算。</div>`;
    } else if (shop.type === 'karaoke_student_db') {
      specialNote += `<div class="note" style="color: #ff3b30; font-weight: bold;">※学生専用料金（全時間帯ドリンクバー込）。</div>`;
    } else if (shop.type === 'karaoke_student_akiba') {
      specialNote += `<div class="note" style="color: #ff3b30; font-weight: bold;">※学生専用料金。<br>※フリータイム・週末昼3hはDバー込。他は別途1Dで計算。</div>`;
    } else if (shop.type === 'netcafe') {
      specialNote += `<div class="note" style="color: #0066ff; font-weight: bold;">※ドリンクバー料金込み</div>`;
    }

    listDiv.innerHTML += `
      <div class="shop-card" style="${cardStyle}">
        <div class="shop-card-top">
          <div class="shop-info">
            <span class="shop-area-badge">${areaNames[shop.area]}</span>
            <h3>${rank}${shop.name}</h3>
            <div class="shop-breakdown">${shop.breakdown}</div>
            ${shop.drink > 0 && currentTime !== 'free' && !['karaoke_student_akiba', 'karaoke_student_gotanda', 'round1'].includes(shop.type) ? `<div class="note">※ドリンク代目安500円含む</div>` : ''}
            ${shop.type === 'coin' ? `<div class="note">※1ゲーム100円で計算した概算</div>` : ''}
            ${specialNote}
          </div>
          <div class="shop-price">${shop.priceText}</div>
        </div>
        ${machinesHtml}
      </div>
    `;

    if (shop.lat && shop.lng && !isUnavailable) {
      let marker = L.marker([shop.lat, shop.lng]).addTo(map);
      marker.bindPopup(`<b>${shop.name}</b><br>総額: ${shop.priceText}`);
      if (isCheapest) marker.openPopup();
      markerObjects.push(marker);
    }
  });

  if (markerObjects.length > 0) {
    let group = new L.featureGroup(markerObjects);
    map.fitBounds(group.getBounds(), { padding: [30, 30], maxZoom: 15 });
  }
}

function setDaytime(val) {
  document.querySelectorAll('#daytime-selectors .btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  currentDaytime = val; updateDisplay();
}

function setTime(val) {
  document.querySelectorAll('#time-selectors .btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  currentTime = val; updateDisplay();
}

function setArea(val) {
  document.querySelectorAll('#area-selectors .btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  currentArea = val; updateDisplay();
}

window.onload = () => { updateDisplay(); };
</script>
</body>
</html>
